<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Contact</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f1419;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Ambient gradient blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
            animation: drift 20s ease-in-out infinite alternate;
        }
        .bg-blob.one {
            width: 500px; height: 500px;
            background: #5865F2;
            top: -10%; left: -10%;
        }
        .bg-blob.two {
            width: 400px; height: 400px;
            background: #3b82f6;
            bottom: -10%; right: -10%;
            animation-delay: -10s;
        }
        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.1); }
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 0.55rem 1.1rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(12px);
            transition: all 0.25s ease;
            z-index: 10;
        }
        .back-btn:hover {
            background: rgba(88, 101, 242, 0.15);
            border-color: rgba(88, 101, 242, 0.4);
            color: #ffffff;
            transform: translateX(-2px);
        }

        /* Card */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem 2.5rem 2.5rem;
            text-align: center;
            backdrop-filter: blur(24px);
            box-shadow:
                0 24px 48px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            max-width: 440px;
            width: 90%;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                        box-shadow 0.4s ease;
        }
        .container:hover {
            transform: translateY(-4px);
            box-shadow:
                0 32px 64px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(88, 101, 242, 0.15) inset,
                0 0 60px rgba(88, 101, 242, 0.06);
        }

        /* Discord logo SVG container */
        .discord-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #5865F2, #4752C4);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(88, 101, 242, 0.3);
        }
        .discord-logo svg {
            width: 36px;
            height: 36px;
            fill: #ffffff;
        }

        .title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #ffffff;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* Username display */
        .username-wrapper {
            position: relative;
            background: rgba(88, 101, 242, 0.08);
            border: 1px solid rgba(88, 101, 242, 0.2);
            border-radius: 14px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .username-wrapper:hover {
            background: rgba(88, 101, 242, 0.12);
            border-color: rgba(88, 101, 242, 0.35);
        }
        .username-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #5865F2;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .username {
            font-family: 'Inter', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        /* Copy button */
        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #5865F2;
            border: none;
            border-radius: 12px;
            padding: 0.85rem 2rem;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }
        .copy-btn:hover {
            background: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(88, 101, 242, 0.35);
        }
        .copy-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(88, 101, 242, 0.3);
        }
        .copy-btn.copied {
            background: #22c55e;
        }
        .copy-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transition: transform 0.2s ease;
        }
        .copy-btn:hover svg {
            transform: scale(1.1);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(34, 197, 94, 0.95);
            color: #ffffff;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 100;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Status dot */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 1.5rem;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
        }

        @media (max-width: 480px) {
            .container { padding: 2rem 1.5rem 1.5rem; }
            .title { font-size: 1.5rem; }
            .username { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="bg-blob one"></div>
    <div class="bg-blob two"></div>

    <a href="index.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
    </a>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <div class="container">
        <div class="discord-logo">
            <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.227-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        </div>

        <h1 class="title">Discord</h1>
        <p class="subtitle">Add me on Discord to connect</p>

        <div class="username-wrapper" onclick="copyUsername()">
            <span class="username-label">Username</span>
            <span class="username" id="username">niceman69400000</span>
        </div>

        <button class="copy-btn" id="copyBtn" onclick="copyUsername()">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            Copy Username
        </button>

        <div class="status">
            <span class="status-dot"></span>
            Usually online
        </div>
    </div>

    <script>
        function copyUsername() {
            const username = document.getElementById('username').textContent;
            const btn = document.getElementById('copyBtn');
            const toast = document.getElementById('toast');

            navigator.clipboard.writeText(username).then(() => {
                // Button feedback
                btn.classList.add('copied');
                btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg> Copied!';

                // Toast
                toast.classList.add('show');

                setTimeout(() => {
                    toast.classList.remove('show');
                    btn.classList.remove('copied');
                    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Username';
                }, 2000);
            });
        }
    </script>
</body>
</html>
